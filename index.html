function fmt(n, compact=false) {
  const num = Number(n||0);
  if (compact && Math.abs(num) >= 100000) return '₹' + (num/100000).toFixed(1) + 'L';
  return '₹' + num.toLocaleString('en-IN', {minimumFractionDigits:2, maximumFractionDigits:2});
}
function today() { return new Date().toISOString().slice(0,10); }
function Spinner() { return <div className="animate-spin w-7 h-7 border-4 border-blue-600 border-t-transparent rounded-full mx-auto"/>; }

/* ── PAGE: EXECUTIVE DASHBOARD ───────────────────────── */
function DashboardPage({ db, isDemo }) {
  const [accs, setAccs]   = useState([]);
  const [txns, setTxns]   = useState([]);
  const [date, setDate]   = useState(today());
  const [loading, setLoading] = useState(true);
  const chartRef = useRef(null);
  const chartInst = useRef(null);

  const load = useCallback(async () => {
    setLoading(true);
    try {
      if (isDemo || !db) {
        setAccs(DEMO_ACCOUNTS); setTxns(DEMO_TXN);
      } else {
        const [r1,r2] = await Promise.all([
          db.from('bank_accounts').select('*').order('account_name'),
          db.from('transactions').select('*').order('date', {ascending:false}).limit(2000),
        ]);
        setAccs(r1.data||[]); setTxns(r2.data||[]);
      }
    } catch(e) { setAccs(DEMO_ACCOUNTS); setTxns(DEMO_TXN); }
    finally { setLoading(false); }
  },[db,isDemo]);

  useEffect(()=>{ load(); },[load]);

  // Compute per-entity stats for selected date (matches Excel logic)
  const entityStats = useMemo(()=>{
    return accs.map(acc => {
      const allTxns = txns.filter(t => t.account_id === acc.id);
      const opening_balance = Number(acc.opening_balance || 0);

      // Opening = base + all txns BEFORE selected date
      const beforeDate = allTxns.filter(t => t.date < date);
      const openingAdj = opening_balance
        + beforeDate.reduce((s,t)=>s+(Number(t.credit)||0),0)
        - beforeDate.reduce((s,t)=>s+(Number(t.debit)||0),0);

      // Today's txns
      const todayTxns = allTxns.filter(t => t.date === date);
      const credit = todayTxns.reduce((s,t)=>s+(Number(t.credit)||0),0);
      const debit  = todayTxns.reduce((s,t)=>s+(Number(t.debit)||0),0);
      const net    = credit - debit;
      const closing = openingAdj + net;

      let status = '— No Activity';
      if (credit > 0 || debit > 0) status = net >= 0 ? '▲ Surplus' : '▼ Deficit';

      return { ...acc, opening: openingAdj, credit, debit, net, closing, status, todayTxns };
    });
  },[accs,txns,date]);

  const grand = useMemo(()=>({
    opening: entityStats.reduce((s,e)=>s+e.opening,0),
    credit:  entityStats.reduce((s,e)=>s+e.credit,0),
    debit:   entityStats.reduce((s,e)=>s+e.debit,0),
    net:     entityStats.reduce((s,e)=>s+e.net,0),
    closing: entityStats.reduce((s,e)=>s+e.closing,0),
  }),[entityStats]);

  const todayAllTxns = useMemo(()=>
    txns.filter(t=>t.date===date).sort((a,b)=>a.date>b.date?1:-1)
  ,[txns,date]);

  // Build chart data: closing balance per day last 14 days
  const chartData = useMemo(()=>{
    const days = [];
    for (let i=13; i>=0; i--) {
      const d = new Date(); d.setDate(d.getDate()-i);
      days.push(d.toISOString().slice(0,10));
    }
    return days.map(d=>{
      const total = accs.reduce((sum, acc)=>{
        const base = Number(acc.opening_balance||0);
        const rel = txns.filter(t=>t.account_id===acc.id && t.date<=d);
        return sum + base
          + rel.reduce((s,t)=>s+(Number(t.credit)||0),0)
          - rel.reduce((s,t)=>s+(Number(t.debit)||0),0);
      },0);
      return { date: d.slice(5), total };
    });
  },[accs,txns]);

  useEffect(()=>{
    if (!chartRef.current || !chartData.length) return;
    if (chartInst.current) chartInst.current.destroy();
    chartInst.current = new Chart(chartRef.current.getContext('2d'),{
      type:'line',
      data:{
        labels: chartData.map(d=>d.date),
        datasets:[{
          label:'Total Closing Balance',
          data: chartData.map(d=>d.total),
          borderColor:'#3b82f6', backgroundColor:'rgba(59,130,246,.08)',
          borderWidth:2, fill:true, tension:.4, pointRadius:3,
        }]
      },
      options:{
        responsive:true, maintainAspectRatio:false,
        plugins:{ legend:{display:false}, tooltip:{ callbacks:{ label: c=>`₹${Number(c.parsed.y).toLocaleString('en-IN')}` }}},
        scales:{
          y:{ ticks:{ callback:v=>`₹${(v/100000).toFixed(0)}L` }, grid:{color:'#f1f5f9'} },
          x:{ grid:{display:false} }
        }
      }
    });
    return ()=>{ if(chartInst.current) chartInst.current.destroy(); };
  },[chartData]);

  if (loading) return <Loading/>;

  return (
    <div className="space-y-5 fade">
      {/* Header */}
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">Executive Financial Dashboard</h2>
          <p className="text-sm text-gray-500">Opening = prev day closing · Credit & Debit = selected date · Closing = Opening + Credit − Debit</p>
        </div>
        <div className="flex items-center gap-3">
          <input type="date" value={date} onChange={e=>setDate(e.target.value)}
            className="border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none bg-white shadow-sm"/>
          <button onClick={load} className="flex items-center gap-2 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm text-gray-600 hover:bg-gray-50 shadow-sm">
            <Ic.Refresh/>
          </button>
        </div>
      </div>

      {isDemo && (
        <div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-800 flex gap-2">
          <strong>Demo Mode</strong> — go to Settings to connect real data.
        </div>
      )}

      {/* Grand total summary cards */}
      <div className="grid grid-cols-2 md:grid-cols-5 gap-3">
        {[
          {l:'Total Opening',  v:grand.opening, c:'bg-slate-700'},
          {l:'Total Credit In',v:grand.credit,  c:'bg-emerald-600'},
          {l:'Total Debit Out',v:grand.debit,   c:'bg-red-500'},
          {l:'Net Movement',   v:grand.net,      c:grand.net>=0?'bg-blue-600':'bg-orange-500'},
          {l:'Total Closing',  v:grand.closing,  c:'bg-indigo-600'},
        ].map(s=>(
          <div key={s.l} className={`${s.c} rounded-xl p-4 text-white`}>
            <p className="text-xs font-medium opacity-80">{s.l}</p>
            <p className="text-lg font-bold mt-1">{fmt(s.v, true)}</p>
          </div>
        ))}
      </div>

      {/* Entity table — exactly like your Excel Executive_Dashboard */}
      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div className="px-6 py-3 border-b border-gray-100 bg-gray-50 flex items-center justify-between">
          <h3 className="font-semibold text-gray-900">Entity-wise Balance</h3>
          <span className="text-xs text-gray-400">Date: {date}</span>
        </div>
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead>
              <tr className="bg-gray-800 text-white">
                <th className="px-4 py-3 text-left font-semibold">#</th>
                <th className="px-4 py-3 text-left font-semibold">Entity | Bank</th>
                <th className="px-4 py-3 text-right font-semibold">Opening ₹</th>
                <th className="px-4 py-3 text-right font-semibold">Credit In ₹</th>
                <th className="px-4 py-3 text-right font-semibold">Debit Out ₹</th>
                <th className="px-4 py-3 text-right font-semibold">Net ₹</th>
                <th className="px-4 py-3 text-right font-semibold">Closing ₹</th>
                <th className="px-4 py-3 text-center font-semibold">Status</th>
              </tr>
            </thead>
            <tbody>
              {entityStats.map((e,i)=>(
                <tr key={e.id} className={i%2?'bg-gray-50/60':'bg-white'}>
                  <td className="px-4 py-3 text-gray-500">{i+1}</td>
                  <td className="px-4 py-3">

                    <th className="px-3 py-2 text-left text-xs font-semibold text-gray-500 uppercase">Category</th>
                    <th className="px-3 py-2 text-right text-xs font-semibold text-emerald-600 uppercase">Credit In</th>

        </div>
      </div>

  );
}

/* ── PAGE: UPLOAD ────────────────────────────────────── */
function UploadPage({ db, isDemo, backendUrl }) {
  const [accs, setAccs]     = useState([]);
  const [selAcc, setSelAcc] = useState('');
  const [file, setFile]     = useState(null);
  const [drag, setDrag]     = useState(false);
  const [busy, setBusy]     = useState(false);
  const [result, setResult] = useState(null);
  const [preview, setPreview] = useState([]);
  const [err, setErr]       = useState('');
  const [saved, setSaved]   = useState(false);
  const fileRef = useRef(null);

  useEffect(()=>{
    (async()=>{
      if(isDemo||!db){ setAccs(DEMO_ACCOUNTS); setSelAcc(DEMO_ACCOUNTS[0].id); return; }
      const {data}=await db.from('bank_accounts').select('*');
      setAccs(data||[]); if(data?.length) setSelAcc(data[0].id);
    })();
  },[db,isDemo]);

  const ACCEPTED = '.pdf,.jpg,.jpeg,.png,.webp,.bmp,.tiff';
  const isImage = f => f && /\.(jpg|jpeg|png|webp|bmp|tiff)$/i.test(f.name);

  const onDrop = useCallback(e=>{
    e.preventDefault(); setDrag(false);
    const f=e.dataTransfer.files[0];
    if(f){ setFile(f); setResult(null); setPreview([]); setErr(''); setSaved(false); }
  },[]);

  const extract = async()=>{
    if(!file||!selAcc){ setErr('Select an account and a file.'); return; }
    setBusy(true); setErr('');
    try {
      if(isDemo||!backendUrl||backendUrl.includes('localhost')){
        await new Promise(r=>setTimeout(r,1500));
        const sim=[
          {date:'2026-03-26',description:'RTGS – BHARAT SILICA WORKS',     debit:null,   credit:300000,  balance:37130377.76},
          {date:'2026-03-26',description:'NEFT – BHARAT SILICA WORKS',     debit:null,   credit:122187,  balance:37008190.76},
          {date:'2026-03-26',description:'RTGS/SKYWIN ENTERPRISE',          debit:null,   credit:300000,  balance:37308190.76},
          {date:'2026-03-26',description:'MMT/IMPS – RESUBHURIYA',          debit:10000,  credit:null,    balance:37329122.76},
          {date:'2026-03-26',description:'BIL/ONL – Dakshin Gujarat',       debit:112228.56,credit:null,  balance:37254956.32},
          {date:'2026-03-26',description:'UPI autobahn021844',              debit:2254,   credit:null,    balance:37257210.32},
          {date:'2026-03-26',description:'INF/INFT FASTAGISSUANCE',         debit:20000,  credit:null,    balance:37277210.32},
        ];
        setPreview(sim);
        setResult({pdf_type: isImage(file)?'image (OCR simulated)':'text-based (table simulated)', transactions_count:sim.length});
      } else {
        const fd=new FormData();
        fd.append('file',file); fd.append('account_id',selAcc);
        const res=await fetch(`${backendUrl}/upload`,{method:'POST',body:fd});
        if(!res.ok) throw new Error(`Upload failed: ${res.status} ${res.statusText}`);
        const data=await res.json();
        setPreview(data.transactions||[]); setResult(data);
      }
    } catch(e){ setErr(e.message); }
    finally { setBusy(false); }
  };

  const saveDB = async()=>{
    if(!preview.length) return;
    try {
      if(!isDemo&&db){
        const rows=preview.map(t=>({...t,account_id:selAcc,source_pdf:file.name}));
        await db.from('transactions').insert(rows);
      }
      setSaved(true);
    } catch(e){ setErr(e.message); }
  };

  return (
    <div className="space-y-5 fade max-w-3xl">
      <div>
        <h2 className="text-2xl font-bold text-gray-900">Upload Bank Statement</h2>
        <p className="text-gray-500 text-sm">Upload PDF or image — all 17 transactions extracted automatically</p>
      </div>
      {isDemo&&<div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-800"><strong>Demo Mode</strong> — simulated extraction</div>}

      <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <label className="block text-sm font-semibold text-gray-700 mb-2">Entity | Bank Account</label>
        <select value={selAcc} onChange={e=>setSelAcc(e.target.value)}
          className="w-full max-w-sm border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
          <option value="">Choose account…</option>
          {accs.map(a=><option key={a.id} value={a.id}>{a.account_name} | {a.bank_name}</option>)}
        </select>
      </div>

      <div
        onDrop={onDrop} onDragOver={e=>{e.preventDefault();setDrag(true);}} onDragLeave={()=>setDrag(false)}
        onClick={()=>fileRef.current?.click()}
        className={`cursor-pointer rounded-xl border-2 border-dashed p-10 text-center transition-all select-none
          ${drag?'border-blue-500 bg-blue-50':file?'border-emerald-400 bg-emerald-50':'border-gray-300 bg-white hover:border-blue-400 hover:bg-blue-50/30'}`}>
        <input ref={fileRef} type="file" accept={ACCEPTED} className="hidden" onChange={e=>{ if(e.target.files[0]){ setFile(e.target.files[0]); setResult(null); setPreview([]); setErr(''); setSaved(false); }}}/>
        {file ? (
          <div>
            <div className="w-12 h-12 bg-emerald-100 rounded-full flex items-center justify-center mx-auto mb-2 text-emerald-600"><Ic.Check/></div>
            <p className="font-semibold text-emerald-700">{file.name}</p>
            <p className="text-sm text-gray-400 mt-1">{(file.size/1024).toFixed(1)} KB · click to change</p>
          </div>
        ) : (
          <div>
            <div className="w-12 h-12 bg-gray-100 rounded-full flex items-center justify-center mx-auto mb-3 text-gray-500"><Ic.Upload/></div>
            <p className="font-semibold text-gray-700">Drop file here or click to browse</p>
            <p className="text-sm text-gray-400 mt-1">PDF · JPG · PNG · WEBP</p>
            <div className="flex justify-center gap-2 mt-3">
              <span className="px-2 py-1 bg-blue-100 text-blue-700 text-xs rounded-full">PDF → pdfplumber table</span>
              <span className="px-2 py-1 bg-violet-100 text-violet-700 text-xs rounded-full">Image → OCR</span>
              <span className="px-2 py-1 bg-emerald-100 text-emerald-700 text-xs rounded-full">Multi-page ✓</span>
            </div>
          </div>
        )}
      </div>

      {err&&<div className="bg-red-50 border border-red-200 rounded-xl px-4 py-3 text-sm text-red-700">{err}</div>}

      {file&&!result&&(
        <button onClick={extract} disabled={busy}
          className="flex items-center gap-2 px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold disabled:opacity-50">
          {busy?<><div className="w-4 h-4 border-2 border-white border-t-transparent rounded-full animate-spin"/>Processing…</>:<><Ic.Upload/>Extract Transactions</>}
        </button>
      )}

      {result&&(
        <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
          <div className="flex items-center justify-between px-5 py-3 border-b border-gray-100">
            <div>
              <p className="font-semibold text-gray-900">Extraction Complete — {result.transactions_count} transactions</p>
              <p className="text-xs text-gray-400">{result.pdf_type}</p>
            </div>
            {saved
              ? <span className="flex items-center gap-2 px-4 py-2 bg-emerald-100 text-emerald-700 rounded-lg text-sm font-semibold"><Ic.Check/>Saved</span>
              : <button onClick={saveDB} className="flex items-center gap-2 px-4 py-2 bg-emerald-600 hover:bg-emerald-700 text-white rounded-lg text-sm font-semibold"><Ic.Check/>Save to Database</button>
            }
          </div>
          <div className="overflow-x-auto max-h-72">
            <table className="w-full text-sm">
              <thead className="bg-gray-50 sticky top-0">
                <tr>
                  <th className="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase">Date</th>
                  <th className="px-4 py-2 text-left text-xs font-semibold text-gray-500 uppercase">Description</th>
                  <th className="px-4 py-2 text-right text-xs font-semibold text-red-500 uppercase">Debit</th>
                  <th className="px-4 py-2 text-right text-xs font-semibold text-emerald-600 uppercase">Credit</th>
                  <th className="px-4 py-2 text-right text-xs font-semibold text-gray-500 uppercase">Balance</th>
                </tr>
              </thead>
              <tbody>
                {preview.map((t,i)=>(
                  <tr key={i} className={i%2?'bg-gray-50/60':'bg-white'}>
                    <td className="px-4 py-2 text-gray-500">{t.date}</td>
                    <td className="px-4 py-2 text-gray-800 max-w-xs truncate" title={t.description}>{t.description}</td>
                    <td className="px-4 py-2 text-right font-medium text-red-600">{t.debit?`₹${Number(t.debit).toLocaleString('en-IN')}`:'—'}</td>
                    <td className="px-4 py-2 text-right font-medium text-emerald-600">{t.credit?`₹${Number(t.credit).toLocaleString('en-IN')}`:'—'}</td>
                    <td className="px-4 py-2 text-right font-semibold">{t.balance?`₹${Number(t.balance).toLocaleString('en-IN')}`:'—'}</td>
                  </tr>
                ))}
              </tbody>
            </table>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PAGE: FULL LEDGER ───────────────────────────────── */
function LedgerPage({ db, isDemo }) {
  const [txns, setTxns]   = useState([]);
  const [accs, setAccs]   = useState([]);
  const [loading, setLoading] = useState(true);
  const [f, setF] = useState({acc:'',cat:'',from:'',to:'',q:''});
  const [pg, setPg] = useState(1); const PER=20;
  const [editRow, setEditRow] = useState(null);

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      if(isDemo||!db){ setTxns(DEMO_TXN); setAccs(DEMO_ACCOUNTS); }
      else {
        const [r1,r2]=await Promise.all([
          db.from('transactions').select('*').order('date',{ascending:false}),
          db.from('bank_accounts').select('*'),
        ]);
        setTxns(r1.data||[]); setAccs(r2.data||[]);
      }
    } finally { setLoading(false); }
  },[db,isDemo]);
  useEffect(()=>{ load(); },[load]);

  const filtered = txns.filter(t=>{
    if(f.acc && t.account_id!==f.acc) return false;
    if(f.cat && t.category!==f.cat) return false;
    if(f.from && t.date<f.from) return false;
    if(f.to   && t.date>f.to)   return false;
    if(f.q && !t.description?.toLowerCase().includes(f.q.toLowerCase())) return false;
    return true;
  });

  const pages = Math.ceil(filtered.length/PER)||1;
  const rows  = filtered.slice((pg-1)*PER, pg*PER);

  const exportCSV = ()=>{
    const hdr='Date,Entity,Description,Category,Credit In,Debit Out,Balance,Source\n';
    const body=filtered.map(t=>{
      const acc=accs.find(a=>a.id===t.account_id);
      return `${t.date},"${acc?.account_name||''}","${t.description||''}","${t.category||''}",${t.credit||''},${t.debit||''},${t.balance||''},"${t.source_pdf||''}"`;
    }).join('\n');
    const url=URL.createObjectURL(new Blob([hdr+body],{type:'text/csv'}));
    Object.assign(document.createElement('a'),{href:url,download:'ledger.csv'}).click();
  };

  const saveEdit = async()=>{
    if(!editRow) return;
    try {
      if(!isDemo&&db) await db.from('transactions').update(editRow).eq('id',editRow.id);
      setTxns(prev=>prev.map(t=>t.id===editRow.id?editRow:t));
      setEditRow(null);
    } catch(e){ alert(e.message); }
  };

  if(loading) return <Loading/>;

  return (
    <div className="space-y-4 fade">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">Full Transaction Ledger</h2>
          <p className="text-gray-500 text-sm">{filtered.length} of {txns.length} transactions</p>
        </div>
        <div className="flex gap-2">
          <button onClick={load} className="flex items-center gap-2 px-3 py-2 bg-white border border-gray-200 rounded-lg text-sm hover:bg-gray-50 shadow-sm"><Ic.Refresh/></button>
          <button onClick={exportCSV} className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-lg text-sm font-medium shadow-sm"><Ic.Download/>CSV</button>
        </div>
      </div>
      {isDemo&&<div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-800"><strong>Demo Mode</strong></div>}

      {/* Filters */}
      <div className="bg-white rounded-xl p-4 shadow-sm border border-gray-100 grid grid-cols-2 md:grid-cols-5 gap-3">
        <input className="col-span-2 border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
          placeholder="Search description…" value={f.q} onChange={e=>{ setF({...f,q:e.target.value}); setPg(1); }}/>
        <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
          value={f.acc} onChange={e=>{ setF({...f,acc:e.target.value}); setPg(1); }}>
          <option value="">All Entities</option>
          {accs.map(a=><option key={a.id} value={a.id}>{a.account_name} | {a.bank_name}</option>)}
        </select>
        <select className="border border-gray-200 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"
          value={f.cat} onChange={e=>{ setF({...f,cat:e.target.value}); setPg(1); }}>
          <option value="">All Categories</option>
          {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
        </select>
        <div className="flex gap-1">
          <input type="date" value={f.from} onChange={e=>{ setF({...f,from:e.target.value}); setPg(1); }}
            className="flex-1 border border-gray-200 rounded-lg px-2 py-2 text-xs focus:ring-2 focus:ring-blue-500 outline-none"/>
          <input type="date" value={f.to} onChange={e=>{ setF({...f,to:e.target.value}); setPg(1); }}
            className="flex-1 border border-gray-200 rounded-lg px-2 py-2 text-xs focus:ring-2 focus:ring-blue-500 outline-none"/>
        </div>
      </div>

      <div className="bg-white rounded-xl shadow-sm border border-gray-100 overflow-hidden">
        <div className="overflow-x-auto">
          <table className="w-full text-sm">
            <thead className="bg-gray-800 text-white">
              <tr>
                <th className="px-4 py-3 text-left font-semibold">Date</th>
                <th className="px-4 py-3 text-left font-semibold">Entity | Bank</th>
                <th className="px-4 py-3 text-left font-semibold">Description</th>
                <th className="px-4 py-3 text-left font-semibold">Category</th>
                <th className="px-4 py-3 text-right font-semibold text-emerald-300">Credit In ₹</th>
                <th className="px-4 py-3 text-right font-semibold text-red-300">Debit Out ₹</th>
                <th className="px-4 py-3 text-center font-semibold">Edit</th>
              </tr>
            </thead>
            <tbody>
              {rows.length===0?(
                <tr><td colSpan={7} className="px-4 py-16 text-center text-gray-400">No transactions found</td></tr>
              ):rows.map((t,i)=>{
                const acc=accs.find(a=>a.id===t.account_id);
                return (
                  <tr key={t.id||i} className={i%2?'bg-gray-50/60':'bg-white'}>
                    <td className="px-4 py-2.5 text-gray-500 whitespace-nowrap">{t.date}</td>
                    <td className="px-4 py-2.5">
                      <p className="font-medium text-gray-900 text-xs">{acc?.account_name||'—'}</p>
                      <p className="text-xs text-gray-400">{acc?.bank_name||''}</p>
                    </td>
                    <td className="px-4 py-2.5 text-gray-700 max-w-xs truncate" title={t.description}>{t.description}</td>
                    <td className="px-4 py-2.5">
                      <span className="px-2 py-0.5 bg-gray-100 text-gray-600 rounded text-xs">{t.category||'—'}</span>
                    </td>
                    <td className="px-4 py-2.5 text-right font-semibold text-emerald-600">{t.credit?`₹${Number(t.credit).toLocaleString('en-IN')}`:'—'}</td>
                    <td className="px-4 py-2.5 text-right font-semibold text-red-500">{t.debit?`₹${Number(t.debit).toLocaleString('en-IN')}`:'—'}</td>
                    <td className="px-4 py-2.5 text-center">
                      <button onClick={()=>setEditRow({...t})} className="text-gray-400 hover:text-blue-600"><Ic.Pencil/></button>
                    </td>
                  </tr>
                );
              })}
            </tbody>
          </table>
        </div>
        {pages>1&&(
          <div className="flex items-center justify-between px-5 py-3 border-t border-gray-100 text-sm text-gray-500">
            <span>Showing {(pg-1)*PER+1}–{Math.min(pg*PER,filtered.length)} of {filtered.length}</span>
            <div className="flex gap-1">
              <button disabled={pg<=1} onClick={()=>setPg(p=>p-1)} className="px-3 py-1 border border-gray-200 rounded-lg disabled:opacity-40 hover:bg-gray-50">‹</button>
              <span className="px-3">{pg}/{pages}</span>
              <button disabled={pg>=pages} onClick={()=>setPg(p=>p+1)} className="px-3 py-1 border border-gray-200 rounded-lg disabled:opacity-40 hover:bg-gray-50">›</button>
            </div>
          </div>
        )}
      </div>

      {/* Edit Modal */}
      {editRow&&(
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 fade">
            <div className="flex items-center justify-between mb-5">
              <h3 className="text-lg font-bold">Edit Transaction</h3>
              <button onClick={()=>setEditRow(null)} className="text-gray-400 hover:text-gray-600"><Ic.Close/></button>
            </div>
            <div className="space-y-3">
              {[{l:'Date',k:'date',t:'date'},{l:'Description',k:'description',t:'text'}].map(f=>(
                <div key={f.k}>
                  <label className="block text-sm font-medium text-gray-700 mb-1">{f.l}</label>
                  <input type={f.t} value={editRow[f.k]||''} onChange={e=>setEditRow({...editRow,[f.k]:e.target.value})}
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
              ))}
              <div>
                <label className="block text-sm font-medium text-gray-700 mb-1">Category</label>
                <select value={editRow.category||''} onChange={e=>setEditRow({...editRow,category:e.target.value})}
                  className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none">
                  <option value="">Select…</option>
                  {CATEGORIES.map(c=><option key={c} value={c}>{c}</option>)}
                </select>
              </div>
              {[{l:'Credit In ₹',k:'credit'},{l:'Debit Out ₹',k:'debit'}].map(f=>(
                <div key={f.k}>
                  <label className="block text-sm font-medium text-gray-700 mb-1">{f.l}</label>
                  <input type="number" value={editRow[f.k]||''} onChange={e=>setEditRow({...editRow,[f.k]:e.target.value?Number(e.target.value):null})}
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
              ))}
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={()=>setEditRow(null)} className="flex-1 border border-gray-200 rounded-xl py-2 text-sm hover:bg-gray-50">Cancel</button>
              <button onClick={saveEdit} className="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-2 text-sm font-semibold">Save</button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PAGE: ACCOUNTS ──────────────────────────────────── */
function AccountsPage({ db, isDemo }) {
  const [accs, setAccs]   = useState([]);
  const [modal, setModal] = useState(false);
  const [loading, setLoading] = useState(true);
  const [saving, setSaving]   = useState(false);
  const empty = {account_name:'',bank_name:'',account_number:'',currency:'INR',opening_balance:0,balance:0};
  const [form, setForm] = useState(empty);

  const load = useCallback(async()=>{
    setLoading(true);
    try {
      if(isDemo||!db){ setAccs(DEMO_ACCOUNTS); }
      else { const {data}=await db.from('bank_accounts').select('*'); setAccs(data||[]); }
    } finally { setLoading(false); }
  },[db,isDemo]);
  useEffect(()=>{ load(); },[load]);

  const add = async()=>{
    if(!form.account_name||!form.bank_name) return;
    setSaving(true);
    try {
      if(!isDemo&&db){ await db.from('bank_accounts').insert([form]); await load(); }
      else { setAccs(p=>[...p,{...form,id:String(Date.now())}]); }
      setForm(empty); setModal(false);
    } catch(e){ alert(e.message); }
    finally { setSaving(false); }
  };

  if(loading) return <Loading/>;

  return (
    <div className="space-y-5 fade">
      <div className="flex items-center justify-between">
        <div>
          <h2 className="text-2xl font-bold text-gray-900">Bank Accounts / Entities</h2>
          <p className="text-gray-500 text-sm">{accs.length} entities configured</p>
        </div>
        <button onClick={()=>setModal(true)} className="flex items-center gap-2 px-4 py-2 bg-blue-600 hover:bg-blue-700 text-white rounded-xl text-sm font-semibold shadow-sm">
          <Ic.Plus/>Add Entity
        </button>
      </div>
      {isDemo&&<div className="bg-amber-50 border border-amber-200 rounded-xl px-4 py-3 text-sm text-amber-800"><strong>Demo Mode</strong></div>}

      <div className="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4">
        {accs.map((a,i)=>(
          <div key={a.id} className="bg-white rounded-xl shadow-sm border border-gray-100 p-5">
            <div className="flex items-center gap-3 mb-4">
              <div className={`w-10 h-10 ${ENTITY_COLORS[i%ENTITY_COLORS.length]} rounded-xl flex items-center justify-center text-white font-bold text-xs`}>
                {a.bank_name?.slice(0,2).toUpperCase()||'BK'}
              </div>
              <div>
                <p className="font-semibold text-gray-900 text-sm">{a.account_name}</p>
                <p className="text-xs text-gray-400">{a.bank_name}</p>
              </div>
            </div>
            <div className="space-y-1.5 text-sm">
              <div className="flex justify-between"><span className="text-gray-400">Acc No.</span><span className="font-medium">{a.account_number||'—'}</span></div>
              <div className="flex justify-between"><span className="text-gray-400">Currency</span><span className="font-medium">{a.currency||'INR'}</span></div>
              <div className="flex justify-between border-t border-gray-100 pt-2 mt-2">
                <span className="text-gray-500 font-medium">Opening (Mar 6)</span>
                <span className="font-bold text-gray-700">{fmt(a.opening_balance||0)}</span>
              </div>
              <div className="flex justify-between">
                <span className="text-gray-500 font-medium">Current Balance</span>
                <span className="font-bold text-blue-600">{fmt(a.balance||0)}</span>
              </div>
            </div>
          </div>
        ))}
      </div>

      {modal&&(
        <div className="fixed inset-0 bg-black/60 flex items-center justify-center z-50 p-4">
          <div className="bg-white rounded-2xl shadow-2xl w-full max-w-md p-6 fade">
            <div className="flex items-center justify-between mb-5">
              <h3 className="text-lg font-bold">Add Entity / Account</h3>
              <button onClick={()=>setModal(false)} className="text-gray-400 hover:text-gray-600"><Ic.Close/></button>
            </div>
            <div className="space-y-3">
              {[
                {l:'Entity Name *',      k:'account_name',    t:'text', p:'e.g. Kishan Enterprise'},
                {l:'Bank Name *',        k:'bank_name',       t:'text', p:'e.g. ICICI'},
                {l:'Account Number',     k:'account_number',  t:'text', p:'e.g. 778605500007'},
                {l:'Opening Balance ₹',  k:'opening_balance', t:'number',p:'0'},
              ].map(f=>(
                <div key={f.k}>
                  <label className="block text-sm font-medium text-gray-700 mb-1">{f.l}</label>
                  <input type={f.t} placeholder={f.p} value={form[f.k]||''}
                    onChange={e=>setForm({...form,[f.k]:f.t==='number'?Number(e.target.value):e.target.value})}
                    className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
                </div>
              ))}
            </div>
            <div className="flex gap-3 mt-5">
              <button onClick={()=>setModal(false)} className="flex-1 border border-gray-200 rounded-xl py-2 text-sm hover:bg-gray-50">Cancel</button>
              <button onClick={add} disabled={saving||!form.account_name||!form.bank_name}
                className="flex-1 bg-blue-600 hover:bg-blue-700 text-white rounded-xl py-2 text-sm font-semibold disabled:opacity-50">
                {saving?'Saving…':'Add'}
              </button>
            </div>
          </div>
        </div>
      )}
    </div>
  );
}

/* ── PAGE: SETTINGS ──────────────────────────────────── */
const SQL_SCHEMA=`-- Run in Supabase SQL Editor

CREATE TABLE IF NOT EXISTS bank_accounts (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  account_name  TEXT NOT NULL,
  account_number TEXT,
  bank_name     TEXT NOT NULL,
  currency      TEXT DEFAULT 'INR',
  opening_balance NUMERIC(15,2) DEFAULT 0,
  balance       NUMERIC(15,2) DEFAULT 0,
  created_at    TIMESTAMPTZ DEFAULT NOW()
);

CREATE TABLE IF NOT EXISTS transactions (
  id UUID DEFAULT gen_random_uuid() PRIMARY KEY,
  account_id  UUID REFERENCES bank_accounts(id) ON DELETE CASCADE,
  date        DATE NOT NULL,
  description TEXT,
  category    TEXT,
  debit       NUMERIC(15,2),
  credit      NUMERIC(15,2),
  balance     NUMERIC(15,2),
  source_pdf  TEXT,
  created_at  TIMESTAMPTZ DEFAULT NOW()
);

-- Add category column if upgrading from old schema
ALTER TABLE transactions ADD COLUMN IF NOT EXISTS category TEXT;
-- Add opening_balance if upgrading from old schema
ALTER TABLE bank_accounts ADD COLUMN IF NOT EXISTS opening_balance NUMERIC(15,2) DEFAULT 0;`;

function SettingsPage({ onSave }) {
  const [cfg, setCfg] = useState(getConfig());
  const [ok, setOk] = useState(false);
  const save=()=>{ onSave(cfg); setOk(true); setTimeout(()=>setOk(false),3000); };
  return (
    <div className="space-y-5 fade max-w-2xl">
      <div><h2 className="text-2xl font-bold">Settings</h2><p className="text-gray-500 text-sm">Credentials & database schema</p></div>
      <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100 space-y-4">
        <h3 className="font-semibold">Supabase</h3>
        {[
          {l:'Project URL', k:'supabaseUrl', t:'url',      p:'https://xxxx.supabase.co', h:'Dashboard → Settings → API Keys'},
          {l:'Publishable Key', k:'supabaseKey', t:'password', p:'sb_publishable_...', h:'Publishable key (safe for browser)'},
        ].map(f=>(
          <div key={f.k}>
            <label className="block text-sm font-medium text-gray-700 mb-1">{f.l}</label>
            <input type={f.t} placeholder={f.p} value={cfg[f.k]}
              onChange={e=>setCfg({...cfg,[f.k]:e.target.value})}
              className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
            <p className="text-xs text-gray-400 mt-0.5">{f.h}</p>
          </div>
        ))}
      </div>
      <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <h3 className="font-semibold mb-3">Backend API</h3>
        <input type="url" placeholder="https://bank-reconciliation-f5ip.onrender.com" value={cfg.backendUrl}
          onChange={e=>setCfg({...cfg,backendUrl:e.target.value})}
          className="w-full border border-gray-300 rounded-lg px-3 py-2 text-sm focus:ring-2 focus:ring-blue-500 outline-none"/>
        <p className="text-xs text-gray-400 mt-1">Render.com deployment URL</p>
      </div>
      <div className="bg-white rounded-xl p-5 shadow-sm border border-gray-100">
        <h3 className="font-semibold mb-1">Database Schema</h3>
        <p className="text-xs text-gray-400 mb-3">Run in Supabase → SQL Editor (includes upgrade commands for existing tables)</p>
        <pre className="bg-gray-900 text-emerald-400 rounded-xl p-4 text-xs overflow-x-auto leading-relaxed">{SQL_SCHEMA}</pre>
      </div>
      <button onClick={save} className="flex items-center gap-2 px-6 py-2.5 bg-blue-600 hover:bg-blue-700 text-white rounded-xl font-semibold shadow-sm">
        {ok?<><Ic.Check/>Saved!</>:'Save Settings'}
      </button>
    </div>
  );
}

/* ── ROOT APP ────────────────────────────────────────── */
function App() {
  const [page, setPage] = useState('dashboard');
  const [cfg,  setCfg]  = useState(getConfig());
  const [showSetup, setShowSetup] = useState(false);
  const [db, setDb] = useState(null);
  const isDemo = !cfg.supabaseUrl || !cfg.supabaseKey;

  useEffect(()=>{
    if (!localStorage.getItem('br_visited')) { setShowSetup(true); localStorage.setItem('br_visited','1'); }
  },[]);
  useEffect(()=>{ setDb(buildSB(cfg)); },[cfg]);

  const handleSave = c=>{ saveConfig(c); setCfg(c); setShowSetup(false); };
  const shared = { db, isDemo, backendUrl: cfg.backendUrl };

  return (
    <div className="flex min-h-screen">
      {showSetup && <SetupModal onSave={handleSave}/>}
      <Sidebar page={page} setPage={setPage}/>
      <main className="flex-1 overflow-y-auto bg-slate-100">
        <div className="p-6 md:p-8">
          {page==='dashboard' && <DashboardPage    {...shared}/>}
          {page==='upload'    && <UploadPage       {...shared}/>}
          {page==='ledger'    && <LedgerPage       {...shared}/>}
          {page==='accounts'  && <AccountsPage     {...shared}/>}
          {page==='settings'  && <SettingsPage onSave={handleSave}/>}
        </div>
      </main>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App/>);
</script>
</body>
</html>
